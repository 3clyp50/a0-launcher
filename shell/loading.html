<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:">
    <title>A0 Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: transparent;
            color: #f4f6fb;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-app-region: drag;
            user-select: none;
        }
        .container {
            text-align: center;
            transform-origin: center;
            animation: splash-open 1.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .logo {
            width: 132px;
            height: 132px;
            margin-bottom: 0;
            border-radius: 30px;
            filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.32));
        }
        @keyframes splash-open {
            0% { transform: scale(0.78); opacity: 0; }
            45% { opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes splash-close {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.22); opacity: 0; }
        }
        body.is-opening-app .container {
            animation: splash-close 180ms cubic-bezier(0.2, 0, 0.18, 1) both;
        }
        .update-panel {
            display: flex;
            justify-content: center;
            gap: 10px;
            min-height: 38px;
            margin: 2px 0 14px;
            -webkit-app-region: no-drag;
        }
        .update-panel[hidden] {
            display: none;
        }
        .update-button {
            min-width: 104px;
            height: 36px;
            border: 0;
            border-radius: 7px;
            padding: 0 16px;
            color: #08111f;
            background: #8fd3ff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .update-button.secondary {
            color: #dbeafe;
            background: rgba(255,255,255,0.12);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.16);
        }
        .update-button:disabled {
            cursor: default;
            opacity: 0.65;
        }
        .status {
            font-size: 14px;
            color: rgba(255,255,255,0.72);
            display: none;
            margin: 12px 0 0;
            text-shadow: 0 2px 14px rgba(0, 0, 0, 0.45);
        }
        .spinner {
            display: none;
        }
        .error {
            color: #ff6b6b;
            display: none;
            max-width: 300px;
            margin-top: 12px;
            font-size: 13px;
            line-height: 1.35;
            text-shadow: 0 2px 14px rgba(0, 0, 0, 0.45);
        }
        .error.visible {
            display: block;
        }
        body.requires-action .status {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="assets/icon.png" alt="A0 Launcher" onerror="this.style.display='none'">
        <div class="update-panel" id="launcherUpdatePanel" hidden>
            <button class="update-button" id="launcherUpdateBtn" type="button">Update</button>
            <button class="update-button secondary" id="launcherContinueBtn" type="button" disabled>Continue</button>
        </div>
        <p class="status" id="status">Checking for updates...</p>
        <div class="spinner" id="spinner"></div>
        <p class="error" id="error"></p>
    </div>
    <script>
        const statusEl = document.getElementById('status');
        const spinnerEl = document.getElementById('spinner');
        const errorEl = document.getElementById('error');
        const updatePanel = document.getElementById('launcherUpdatePanel');
        const updateBtn = document.getElementById('launcherUpdateBtn');
        const continueBtn = document.getElementById('launcherContinueBtn');

        window.electronAPI?.onStatusUpdate?.((status) => {
            statusEl.textContent = status;
        });
        window.electronAPI?.onError?.((error) => {
            spinnerEl.style.display = 'none';
            errorEl.textContent = error;
            errorEl.classList.add('visible');
            document.body.classList.add('requires-action');
        });
        window.electronAPI?.onLauncherUpdateAvailable?.((info) => {
            const version = typeof info?.version === 'string' ? info.version : '';
            updateBtn.textContent = version ? `Update ${version}` : 'Update';
            updatePanel.hidden = false;
            document.body.classList.add('requires-action');
            if (info?.readyToContinue) {
                spinnerEl.style.display = 'none';
                continueBtn.disabled = false;
            }
        });
        window.electronAPI?.onLauncherOpeningApp?.(() => {
            document.body.classList.add('is-opening-app');
        });

        updateBtn.addEventListener('click', async () => {
            updateBtn.disabled = true;
            statusEl.textContent = 'Opening update...';
            const result = await window.electronAPI?.openLauncherUpdate?.();
            if (!result?.ok) {
                statusEl.textContent = result?.message || 'Could not open update.';
                updateBtn.disabled = false;
                return;
            }
            statusEl.textContent = 'Update opened in your browser.';
            updateBtn.disabled = false;
        });

        continueBtn.addEventListener('click', async () => {
            continueBtn.disabled = true;
            statusEl.textContent = 'Opening launcher...';
            const result = await window.electronAPI?.continueAfterLauncherUpdate?.();
            if (!result?.ok) {
                statusEl.textContent = result?.message || 'Could not continue.';
                continueBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
