<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; font-src 'self'; style-src 'self'; form-action a0-credential-prompt:; base-uri 'none'"
  >
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Save credentials</title>
  <link rel="stylesheet" href="../app/a0ui/index.css">
  <link rel="stylesheet" href="../app/docker_manager.css">
  <link rel="stylesheet" href="credential_prompt.css">
</head>
<body>
  <main
    class="dm-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="dialog-title"
    aria-describedby="dialog-copy storage-note"
  >
    <header class="dm-dialog-header">
      <h1 id="dialog-title" class="dm-dialog-title">Save credentials?</h1>
    </header>

    <section class="dm-dialog-body">
      <p id="dialog-copy" class="dm-dialog-copy">
        You're signed in. Save the credentials you just used so the Launcher can reuse them for this Instance.
      </p>
      <div id="storage-note" class="dm-field-hint">
        Stored with your operating system's secure credential store.
      </div>
    </section>

    <footer class="dm-dialog-footer">
      <form method="get" action="a0-credential-prompt://not-now">
        <button class="button" type="submit">Not now</button>
      </form>
      <form method="get" action="a0-credential-prompt://save">
        <button class="button confirm" type="submit">Save credentials</button>
      </form>
    </footer>
  </main>
</body>
</html>
