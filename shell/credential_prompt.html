<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; font-src 'self'; style-src 'unsafe-inline'; form-action a0-credential-prompt:; base-uri 'none'"
  >
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Save credentials</title>
  <style>
    @font-face {
      font-family: "Rubik";
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url("../app/a0ui/vendor/google/rubik/rubik-400.ttf") format("truetype");
    }

    @font-face {
      font-family: "Rubik";
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url("../app/a0ui/vendor/google/rubik/rubik-500.ttf") format("truetype");
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
      font-family: "Rubik", Arial, Helvetica, sans-serif;
      background: transparent;
      color: #fff;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      padding: 12px;
      -webkit-font-smoothing: antialiased;
    }

    .dialog {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 1px solid rgba(104, 112, 122, 0.52);
      border-radius: 8px;
      background: #131313;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.55);
    }

    .content {
      display: flex;
      flex: 1;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      padding: 18px 24px 20px;
    }

    h1 {
      margin: 0 0 9px;
      font-size: 20px;
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }

    p {
      max-width: 430px;
      margin: 0;
      color: rgba(212, 212, 212, 0.9);
      font-size: 13px;
      line-height: 1.5;
    }

    .storage-note {
      margin-top: 14px;
      color: rgba(212, 212, 212, 0.72);
      font-size: 11.5px;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 62px;
      padding: 12px 20px;
      border-top: 1px solid rgba(68, 68, 68, 0.66);
      -webkit-app-region: no-drag;
    }

    form {
      margin: 0;
    }

    button {
      min-height: 36px;
      padding: 0 15px;
      border: 1px solid rgba(104, 112, 122, 0.52);
      border-radius: 6px;
      background: rgba(45, 45, 45, 0.72);
      color: #fff;
      font: 500 13px/1 "Rubik", Arial, Helvetica, sans-serif;
      cursor: pointer;
      transition: transform 0.16s ease, filter 0.16s ease, border-color 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    button:active {
      transform: none;
    }

    button:focus-visible {
      outline: 2px solid #7393d2;
      outline-offset: 2px;
    }

    .primary {
      border-color: #2b5ab9;
      background: #2b5ab9;
    }

    @media (prefers-reduced-motion: reduce) {
      button {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
    <section class="content">
      <h1 id="dialog-title">Save credentials?</h1>
      <p>You're signed in. Save the credentials you just used so the Launcher can reuse them for this Instance.</p>
      <div class="storage-note">Stored with your operating system's secure credential store.</div>
    </section>

    <footer class="actions">
      <form method="get" action="a0-credential-prompt://not-now">
        <button type="submit">Not now</button>
      </form>
      <form method="get" action="a0-credential-prompt://save">
        <button class="primary" type="submit" autofocus>Save credentials</button>
      </form>
    </footer>
  </main>
</body>
</html>
